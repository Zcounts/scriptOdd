name: Build Installers

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Windows installer
        run: npm run dist:win -- --publish never

      - name: Get version from package.json
        id: pkg
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Find installer file
        id: installer
        shell: bash
        run: |
          INSTALLER=$(find dist -name "*.exe" | head -n 1)
          echo "path=$INSTALLER" >> $GITHUB_OUTPUT
          echo "name=$(basename $INSTALLER)" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.pkg.outputs.version }}-${{ github.run_number }}
          name: scriptOdd v${{ steps.pkg.outputs.version }}
          body: |
            ## scriptOdd — Screenplay Editor

            ### Installation
            1. Download **${{ steps.installer.outputs.name }}** below
            2. Run the installer
            3. Launch **scriptOdd** from your Desktop or Start Menu
          files: ${{ steps.installer.outputs.path }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-mac:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Mac installer
        run: npm run dist:mac -- --publish never

      - name: Get version from package.json
        id: pkg
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Find DMG file
        id: installer
        shell: bash
        run: |
          INSTALLER=$(find dist -name "*.dmg" | head -n 1)
          echo "path=$INSTALLER" >> $GITHUB_OUTPUT
          echo "name=$(basename $INSTALLER)" >> $GITHUB_OUTPUT

      - name: Upload DMG to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.pkg.outputs.version }}-${{ github.run_number }}
          name: scriptOdd v${{ steps.pkg.outputs.version }}
          files: ${{ steps.installer.outputs.path }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
