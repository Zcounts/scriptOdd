name: Release

# Triggers:
#   - Pushed version tags (v*) → full build + GitHub Release
#   - workflow_dispatch       → full build only (no release created)
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  # ── 1. Verify ──────────────────────────────────────────────────────────────
  verify:
    name: Verify (typecheck + tests)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Run tests
        run: npm run test

  # ── 2. Build Windows installer ─────────────────────────────────────────────
  build-windows:
    name: Build Windows installer
    runs-on: windows-latest
    needs: verify

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Windows installer
        run: npm run dist:win
        env:
          # Prevents electron-builder from attempting to publish to GitHub
          # during the build step — release upload is handled separately.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          # Matches: scriptOdd-Setup-<version>.exe (per artifactName in package.json)
          path: dist/*.exe
          retention-days: 7
          if-no-files-found: error

  # ── 3. Build macOS DMG ─────────────────────────────────────────────────────
  build-mac:
    name: Build macOS DMG
    runs-on: macos-latest
    needs: verify

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build macOS DMG
        # NOTE: This produces unsigned, unnotarized DMGs.
        # macOS Gatekeeper will block launch for users who downloaded from the
        # internet unless the app is signed and notarized with an Apple
        # Developer ID certificate. See RELEASE_CHECKLIST.md for details.
        run: npm run dist:mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Suppress codesign attempts when no certificate is configured
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mac-installers
          # Matches: scriptOdd-<version>-x64.dmg and scriptOdd-<version>-arm64.dmg
          path: dist/*.dmg
          retention-days: 7
          if-no-files-found: error

  # ── 4. Create GitHub Release (tag builds only) ─────────────────────────────
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-windows, build-mac]
    # Only run on version tag pushes, not on workflow_dispatch
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write  # required to create releases and upload assets

    steps:
      - name: Download Windows installer
        uses: actions/download-artifact@v4
        with:
          name: windows-installer
          path: artifacts/windows

      - name: Download macOS installers
        uses: actions/download-artifact@v4
        with:
          name: mac-installers
          path: artifacts/mac

      - name: List artifacts
        run: find artifacts -type f | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: scriptOdd ${{ github.ref_name }}
          draft: true
          prerelease: false
          generate_release_notes: true
          body: |
            ## scriptOdd ${{ github.ref_name }}

            Local-only desktop screenwriting app for feature films.

            ### Downloads

            | Platform | File | Notes |
            |----------|------|-------|
            | Windows 10/11 x64 | `scriptOdd-Setup-*.exe` | NSIS installer, per-user, no admin required |
            | macOS x64 | `scriptOdd-*-x64.dmg` | **Unsigned** — see note below |
            | macOS Apple Silicon | `scriptOdd-*-arm64.dmg` | **Unsigned** — see note below |

            ### macOS note

            These DMGs are **not signed or notarized**. macOS Gatekeeper will
            show an "unidentified developer" warning. To open:
            1. Right-click the DMG → Open
            2. Click Open in the dialog

            Proper signing requires an Apple Developer ID certificate. See
            `RELEASE_CHECKLIST.md` for the manual follow-up steps.

            ### Installation (Windows)

            1. Download `scriptOdd-Setup-*.exe`
            2. Run the installer (no admin rights required)
            3. Launch from Desktop or Start Menu

          files: |
            artifacts/windows/*.exe
            artifacts/mac/*.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
