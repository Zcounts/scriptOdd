name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

# Minimal default — only the release job elevates to write
permissions:
  contents: read

jobs:
  # ── 1. Verify ─────────────────────────────────────────────────────────────
  verify:
    name: Verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Run tests
        run: npm run test

  # ── 2a. Build Windows installer ──────────────────────────────────────────
  build-windows:
    name: Build (Windows)
    needs: verify
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Windows installer
        run: npm run dist:win

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: dist/*.exe
          if-no-files-found: error
          retention-days: 1

  # ── 2b. Build macOS DMG (runs in parallel with Windows) ──────────────────
  build-mac:
    name: Build (macOS)
    needs: verify
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build macOS DMG
        run: npm run dist:mac

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: mac-dmg
          path: dist/*.dmg
          if-no-files-found: error
          retention-days: 1

  # ── 3. Create GitHub Release (only on tag pushes) ────────────────────────
  release:
    name: Release
    needs: [build-windows, build-mac]
    runs-on: ubuntu-latest
    # Skip this job on workflow_dispatch (no tag = no release to publish)
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write   # Elevated only for this job

    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-installer
          path: dist

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: mac-dmg
          path: dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true          # Publishes as draft — you review before making it live
          generate_release_notes: true
          files: |
            dist/*.exe
            dist/*.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
